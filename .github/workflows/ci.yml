# Imperecta CI - lint and test on push/PR to main

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: |
          cd backend
          ruff check .

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.TEST_POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          REDIS_URL: ${{ secrets.TEST_REDIS_URL }}
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          JWT_ALGORITHM: ${{ secrets.TEST_JWT_ALGORITHM }}
          JWT_EXPIRATION_MINUTES: ${{ secrets.TEST_JWT_EXPIRATION_MINUTES }}
          JWT_REFRESH_EXPIRATION_DAYS: ${{ secrets.TEST_JWT_REFRESH_EXPIRATION_DAYS }}
          JWT_REFRESH_EXPIRATION_DAYS_REMEMBER: ${{ secrets.TEST_JWT_REFRESH_EXPIRATION_DAYS_REMEMBER }}
          MARKET_DATA_FOREX_URL: ${{ secrets.TEST_MARKET_DATA_FOREX_URL }}
          MARKET_DATA_CRYPTO_URL: ${{ secrets.TEST_MARKET_DATA_CRYPTO_URL }}
          MARKET_DATA_TIMEOUT_SECONDS: ${{ secrets.TEST_MARKET_DATA_TIMEOUT_SECONDS }}
          MARKET_DATA_RETRY_ATTEMPTS: ${{ secrets.TEST_MARKET_DATA_RETRY_ATTEMPTS }}
          CLAUDE_MODEL: ${{ secrets.TEST_CLAUDE_MODEL }}
          EMAIL_FROM: ${{ secrets.TEST_EMAIL_FROM }}
          APP_URL: ${{ secrets.TEST_APP_URL }}
          PROXY_STICKY_DURATION: ${{ secrets.TEST_PROXY_STICKY_DURATION }}
          PROXY_COUNTRY_ROUTING: ${{ secrets.TEST_PROXY_COUNTRY_ROUTING }}
          DECODO_API_URL: ${{ secrets.TEST_DECODO_API_URL }}
          DECODO_ENABLED: ${{ secrets.TEST_DECODO_ENABLED }}
          ALLOWED_ORIGINS: ${{ secrets.TEST_ALLOWED_ORIGINS }}
          APP_ENV: test
          PORT: ${{ secrets.TEST_PORT }}
          BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.TEST_BOOTSTRAP_ADMIN_EMAIL }}
          BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.TEST_BOOTSTRAP_ADMIN_PASSWORD }}
          BOOTSTRAP_ADMIN_NAME: ${{ secrets.TEST_BOOTSTRAP_ADMIN_NAME }}
          BOOTSTRAP_ADMIN_LANGUAGE: ${{ secrets.TEST_BOOTSTRAP_ADMIN_LANGUAGE }}
          BOOTSTRAP_ADMIN_PLAN: ${{ secrets.TEST_BOOTSTRAP_ADMIN_PLAN }}
        run: |
          cd backend
          pytest tests -v

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend Security Scan
        run: |
          pip install bandit safety pip-audit
          bandit -r backend/app/ -c backend/security.cfg -f json -o bandit-report.json || true
          safety check -r backend/requirements.txt --output json > safety-report.json || true
          pip-audit -r backend/requirements.txt --format json -o pip-audit-report.json || true

      - name: Upload backend security reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-reports
          path: |
            bandit-report.json
            safety-report.json
            pip-audit-report.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Security Scan
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high --json > npm-audit-report.json || true
          npx eslint --plugin security src/ --format json -o eslint-security-report.json || true

      - name: Upload frontend security reports
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-reports
          path: |
            frontend/npm-audit-report.json
            frontend/eslint-security-report.json

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --config .gitleaks.toml --report-format json --report-path gitleaks-report.json
        continue-on-error: true

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

      - name: Set up Python for Snyk
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node for Snyk
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies for Snyk
        run: |
          pip install -r backend/requirements.txt
          cd frontend && npm ci
      - name: Snyk Backend
        uses: snyk/actions/python@master
        with:
          command: test
          args: --file=backend/requirements.txt --severity-threshold=high --json-file-output=snyk-backend.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
      - name: Snyk Frontend
        uses: snyk/actions/node@master
        with:
          command: test
          args: --file=frontend/package.json --severity-threshold=high --json-file-output=snyk-frontend.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
      - name: Snyk Code
        uses: snyk/actions/python@master
        with:
          command: code test
          args: --json-file-output=snyk-code.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: snyk-reports
          path: |
            snyk-backend.json
            snyk-frontend.json
            snyk-code.json
