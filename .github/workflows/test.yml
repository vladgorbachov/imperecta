name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-contract-tests:
    name: Backend Contract Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: imperecta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/imperecta_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-for-ci-only
          CLAUDE_API_KEY: ""
          RESEND_API_KEY: ""
          TELEGRAM_BOT_TOKEN: ""
        run: pytest tests/ -v --tb=short

  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: backend-contract-tests
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Install Playwright
        run: npx playwright install chromium
      - name: Run smoke tests
        env:
          BASE_URL: https://imperecta.pages.dev
          API_URL: https://imperecta-production.up.railway.app
        run: npx playwright test tests/smoke.spec.ts
      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
